    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        #glados-screen {
            width: 640px;
            height: 480px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            animation: flicker 0.1s infinite steps(2, jump-start);
            filter: blur(0.5px) contrast(1.2);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
            background-color: black;
        }
        @keyframes flicker {
            0% { opacity: 1; }
            100% { opacity: 0.85; }
        }
        @keyframes glitch {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-2px, 1px); }
            40% { transform: translate(1px, -2px); }
            60% { transform: translate(-1px, 2px); }
            80% { transform: translate(2px, -1px); }
            100% { transform: translate(0, 0); }
        }
        .glitch-effect {
            animation: glitch 0.3s infinite steps(3);
        }
        #loader {
            position: fixed;
            bottom: 10px;
            left: 10px;
            color: #0f0;
            font-family: monospace;
            background: rgba(0,0,0,0.7);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            z-index: 999;
            pointer-events: none;
        }
    </style>
</head>

            'images/glados_screens_warworkers.png',
            'images/glados_screens_wrench001.png'
        ];

        const screenElement = document.getElementById('glados-screen');
        const loaderDiv = document.getElementById('loader');
        
        const loadedImages = [];
        let preloadProgress = 0;
        let animationInterval = null;

        function preloadAllImages(urls) {
            return new Promise((resolve) => {
                let loadedCount = 0;
                const total = urls.length;

                if (total === 0) {
                    resolve([]);
                    return;
                }

                urls.forEach((url, idx) => {
                    const img = new Image();
                    img.onload = () => {
                        loadedCount++;
                        preloadProgress = (loadedCount / total) * 100;
                        loaderDiv.textContent = `Getting images: ${Math.floor(preloadProgress)}%`;
                        loadedImages[idx] = img;
                        if (loadedCount === total) {
                            resolve(loadedImages);
                        }
                    };
                    img.onerror = (err) => {
                        console.warn(`Failed to get: ${url}`, err);
                        loadedCount++;
                        loadedImages[idx] = null;
                        if (loadedCount === total) {
                            resolve(loadedImages);
                        }
                    };
                    img.src = url;
                });
            });
        }

        function startFlicker(imagesArray) {
            setTimeout(() => {
                if (loaderDiv) loaderDiv.style.opacity = '0';
                setTimeout(() => loaderDiv && loaderDiv.remove(), 1000);
            }, 500);

            let currentIdx = 0;
            const validImages = imagesArray.filter(img => img !== null);
            if (validImages.length === 0) {
                console.error('There is not a single image!');
                return;
            }

            screenElement.style.backgroundImage = `url('${validImages[0].src}')`;
            
            animationInterval = setInterval(() => {
                currentIdx = (currentIdx + 1) % validImages.length;
                const nextImg = validImages[currentIdx];
                if (nextImg && nextImg.complete && nextImg.naturalWidth > 0) {
                    screenElement.style.backgroundImage = `url('${nextImg.src}')`;
                } else {
                    console.warn('The image is not ready, skipping');
                }
            }, 50);
        }

        screenElement.addEventListener('click', () => {
            screenElement.classList.toggle('glitch-effect');
        });

        preloadAllImages(imageUrls).then((images) => {
            startFlicker(images);
        }).catch(err => {
            console.error('Preloading error', err);
            loaderDiv.textContent = 'Get error!';
        });
